# Jupyter Book 2 / MyST configuration file.
# This single file controls BOTH the project settings and the table of contents
# (in Jupyter Book v1 these were split across _config.yml and _toc.yml).
# Reference: https://mystmd.org/guide/frontmatter
version: 1

project:
  title: "MLE5217 — Foundations of Machine Learning for Materials Science"
  # An 'id' is optional. Running `jupyter book init` can generate one for you.
  # authors:
    # - name: "Unga Banga"        # <- change to your name
  # ---- Table of contents ----
  # Each '- file:' is one page, in order. 'children:' makes a nested section.
  # Add a new week by copying a notebook and adding a line here.
  toc:
    - file: intro.md
    - title: "Week 0 — Introduction to Python"
      children:
        - file: week00-lecture.ipynb
        - file: week00-python.ipynb
        - file: week00-packages.ipynb
        - file: week00-errors.ipynb
